# bioml default configuration
# Override any of these values by passing a config dict to run_*() functions
# or by pointing to your own YAML file.

data:
  outcome_col: "Case-control status"          # Column name of the binary outcome
  drop_cols:                                   # Columns to drop before modelling
    - "Event"
    - "Patient ID"
    - "Case ID"
  test_size: 0.33                              # Fraction of data held out for testing
  random_state: 42
  correlation_threshold: 0.75                  # Drop one of any pair with abs(r) >= threshold

preprocessing:
  scale: true                                  # StandardScaler before modelling

svm:
  cv_folds: 5
  param_grid:
    estimator__kernel: ["rbf", "poly", "linear", "sigmoid"]
    estimator__C: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0]
    estimator__gamma: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0]

knn:
  param_grid:
    feature_selection__k: [3, 4, 5, 6, 7, 8, 9, 10]
    KNN__n_neighbors: [2, 3, 4, 5]

xgb:
  n_estimators: 150
  early_stopping_rounds: 6
  min_features_to_select: 2
  n_iter: 8                                    # BoostRFE iterations
  param_grid:
    booster: ["gbtree"]
    eta: [0.01, 0.1, 1, 10]
    min_child_weight: [1, 3, 5]
    max_depth: [1, 3, 5]
    gamma: [0, 1, 3, 5]
    subsample: [0.5, 0.75, 1.0]
    lambda: [0, 1, 3, 5]
    alpha: [0, 1, 3, 5]

nn:
  epochs: 150
  batch_size: 10
  optimizer: "adam"
  loss: "binary_crossentropy"

evaluation:
  confidence_level: 0.95
