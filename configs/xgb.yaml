# XGBoost configuration
outcome_col: "Case-control status"
drop_cols: ["Event", "Patient ID", "Case ID"]
test_size: 0.33
random_state: 42
corr_threshold: 0.75
output_dir: "results"
cv_folds: 10
early_stopping_rounds: 6
param_grid:
  n_estimators: [50, 100, 150]
  eta: [0.01, 0.1, 1]
  min_child_weight: [1, 3, 5]
  gamma: [0, 1, 5]
  subsample: [0.5, 0.75, 1.0]
  lambda: [0, 3, 5]
  alpha: [0, 3, 5]
